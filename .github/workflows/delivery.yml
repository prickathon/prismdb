name: Delivery Containers

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT: prismdb
  GCP_REGION: asia-northeast1

jobs:

  delivery:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        SERVICE_NAME: [web, virtuoso]

    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: GCP Authenticate
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Configure docker to use the gcloud cli
        run: gcloud auth configure-docker ${{env.GCP_REGION}}-docker.pkg.dev --quiet

      - name: Set the docker image name
        run: echo "IMAGE=${{env.GCP_REGION}}-docker.pkg.dev/${{env.GCP_PROJECT}}/prismdb/${{ matrix.SERVICE_NAME }}:${{ github.sha }}" >> $GITHUB_ENV

      - name: Build and push web
        if: matrix.SERVICE_NAME == 'web'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./web
          push: true
          tags: ${{ env.IMAGE }}
          build-args: |
            SPARQL_ENDPOINT_URL=${{ secrets.SPARQL_ENDPOINT_URL }}

      - name: Build and push virtuoso
        if: matrix.SERVICE_NAME == 'virtuoso'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./virtuoso
          push: true
          tags: ${{ env.IMAGE }}
          build-contexts: |
            csv2rdf=./csv2rdf
            data=./_data
          build-args: |
            DBA_PASSWORD=${{ secrets.DBA_PASSWORD }}

      - name: Deploy to Cloud Run
        run: |
            gcloud run deploy ${{ matrix.SERVICE_NAME }} \
              --image $IMAGE \
              --project $GCP_PROJECT \
              --region $GCP_REGION \
              --platform managed \
              --memory 512Mi \
              --allow-unauthenticated \
              --quiet \
              $DEPLOY_ARGS

