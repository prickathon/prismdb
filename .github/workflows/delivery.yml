name: Delivery Containers

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT: prismdb
  GCP_REGION: asia-northeast1

jobs:

  delivery:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        SERVICE_NAME: [web, virtuoso]

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: GCP Authenticate
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure docker to use the gcloud cli
        run: gcloud auth configure-docker ${{env.GCP_REGION}}-docker.pkg.dev --quiet

      - name: Set the docker image name
        run: echo "IMAGE=${{env.GCP_REGION}}-docker.pkg.dev/${{env.GCP_PROJECT}}/prismdb/${{ matrix.SERVICE_NAME }}:${{ github.sha }}" >> $GITHUB_ENV

      - name: Build and push web
        if: matrix.SERVICE_NAME == 'web'
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: ${{ env.IMAGE }}
          build-args: |
            SPARQL_ENDPOINT_URL=${{ secrets.SPARQL_ENDPOINT_URL }}

      - name: Build and push virtuoso
        if: matrix.SERVICE_NAME == 'virtuoso'
        uses: docker/build-push-action@v6
        with:
          context: ./virtuoso
          push: true
          tags: ${{ env.IMAGE }}
          build-contexts: |
            csv2rdf=./csv2rdf
            data=./_data
          build-args: |
            DBA_PASSWORD=${{ secrets.DBA_PASSWORD }}

      - name: Deploy to Cloud Run
        run: |
            gcloud run deploy ${{ matrix.SERVICE_NAME }} \
              --image $IMAGE \
              --project $GCP_PROJECT \
              --region $GCP_REGION \
              --platform managed \
              --memory 512Mi \
              --allow-unauthenticated \
              --quiet \
              $DEPLOY_ARGS

      - name: Slack Notification
        uses: lazy-actions/slatify@master
        if: always()
        continue-on-error: true
        with:
          job_name:  ${{ format('*delivery* ({0})', matrix.SERVICE_NAME) }}
          type: ${{ job.status }}
          url: ${{ secrets.SLACK_WEBHOOK }}
          token: ${{ secrets.GITHUB_TOKEN }}
