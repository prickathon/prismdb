name: rdflint

on: [pull_request]

jobs:
  rdflint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: 11
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '25'
      - uses: imas/setup-rdflint@f6f7c4feca3bb31b025d7d01836f2eab596779de # v1.0.7
      - working-directory: csv2rdf
        run: |
          npm ci
          BASE_URL=https://prismdb.takanakahiko.me npm start
      - run: rdflint -config virtuoso/rdflint-config.yml -targetdir csv2rdf/output
